spring.application.name=inmotech
# H2 en memoria para pruebas (cambiar a MySQL en prod)
spring.datasource.url=jdbc:h2:mem:inmotech;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Carpeta raiz donde se guardaran todas las imagenes de propiedades
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# OAuth2 Google - valores por defecto (sobrescribir en application-dev.yml)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:tu-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:tu-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email

# Frontend redirect URI tras login OAuth2 exitoso
app.oauth2.redirect-uri=http://localhost:5173/oauth2/callback


