spring.application.name=inmotech
# Datos de conexion a MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/inmotech?useSSL=false&serverTimezone=UTC
spring.datasource.username=profesor
spring.datasource.password=1234

# Driver JDBC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Carpeta raiz donde se guardaran todas las imagenes de propiedades
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# OAuth2 Google - valores por defecto (sobrescribir en application-dev.yml)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:tu-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:tu-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email

# Frontend redirect URI tras login OAuth2 exitoso
app.oauth2.redirect-uri=http://localhost:5173/oauth2/callback


